services:
  backend:
    build:
      context: ./zen-garden-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ws || true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./zen-garden
    ports:
      - "8060:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
